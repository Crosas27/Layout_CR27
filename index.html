<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Layout Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <h2>Panel Layout Tool</h2>

  <div class="card">
    <label>Wall Length (inches)</label>
    <input id="wallLength" type="number" placeholder="e.g. 480" />

    <label>Panel Coverage</label>
    <input id="panelCoverage" type="number" value="36" />

    <label>Rib Spacing</label>
    <input id="ribSpacing" type="number" value="12" />

    <label>Start Offset</label>
    <input id="startOffset" type="number" value="0" />

    <button id="generateBtn">Generate</button>
  </div>

  <div class="card">
    <h3>Openings</h3>

    <div id="openingsList"></div>

    <div class="opening-form">
      <input id="openingStart" type="number" placeholder="Start (in)" />
      <input id="openingWidth" type="number" placeholder="Width (in)" />
    </div>

    <button id="addOpeningBtn">Add Opening</button>
  </div>

  <div class="card">
    <svg id="wallSvg"></svg>
  </div>

  <div id="openingReport"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
