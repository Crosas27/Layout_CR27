<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="styles.css">

<div class="container">

  <h1>Panel Layout Tool</h1>

  <!-- BUILDING -->
  <div class="card">
    <h2>Building</h2>

    <div class="grid">

      <div class="field">
        <label>Wall Type</label>
        <select id="wallType">
          <option value="sidewall">Sidewall</option>
          <option value="gable">Gable</option>
        </select>
      </div>

      <div class="field">
        <label>Wall Length</label>
        <input id="wallLength" value="200" />
      </div>

      <div class="field">
        <label>Eave Height</label>
        <input id="eaveHeight" value="10'" />
      </div>

      <div class="field">
        <label>Roof Pitch</label>
        <input id="roofPitch" value="4" />
      </div>

    </div>
  </div>


  <!-- PANELS -->
  <div class="card">
    <h2>Panels</h2>

    <div class="grid">

      <div class="field">
        <label>Panel Coverage</label>
        <input id="panelCoverage" value="36" />
      </div>

      <div class="field">
        <label>Rib Spacing</label>
        <input id="ribSpacing" value="12" />
      </div>

      <div class="field">
        <label>Start Offset</label>
        <input id="offset" value="0" />
      </div>

    </div>
  </div>


  <!-- ACTION -->
<button id="generateBtn">Generate Layout</button>

  <!-- OUTPUT -->
  <div class="card">
    <h2>Layout Visualization</h2>
    <svg id="wallSvg"></svg>
  </div>

  <div class="card results" id="results"></div>

</div>
  
<script type="module" src="app.js"></script>

</body>
</html>
