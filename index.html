<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="styles.css">
<title>Panel Layout Tool</title>
</head>

<body>

<div class="app">

<h1>Panel Layout Tool</h1>

<div class="card">

<h2>Building</h2>

<label>Wall Type</label>
<select id="wallType">
<option value="side">Sidewall</option>
<option value="gable">Gable</option>
</select>

<label>Wall Length (inches)</label>
<input id="wallLength" value="144">

<label>Eave Height (gable only)</label>
<input id="eaveHeight" value="120">

<label>Roof Pitch</label>
<input id="roofPitch" value="4">

</div>


<div class="card">

<h2>Panels</h2>

<label>Panel Coverage (in)</label>
<input id="panelCoverage" value="36">

<label>Rib Spacing (in)</label>
<input id="ribSpacing" value="12">

<label>Start Offset (in)</label>
<input id="startOffset" value="5">

</div>


<button id="generateBtn">
Generate Layout
</button>


<div class="card">

<h2>Layout Visualization</h2>

<svg id="wallSvg"></svg>

</div>


<div class="card">

<h2>Results</h2>

<div id="ribTable"></div>

</div>


</div>

<script type="module" src="app.js"></script>

</body>
</html>
