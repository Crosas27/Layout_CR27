<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Panel Layout Tool</title>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <div class="app">

    <h1>Panel Layout Tool</h1>

    <!-- CONTROLS -->
    <div class="controls">

      <label>
        Wall Type
        <select id="wallType">
          <option value="sidewall">Sidewall</option>
          <option value="gable">Gable</option>
        </select>
      </label>

      <label>
        Wall Length (inches)
        <input id="wallLength" type="number" placeholder="1440" />
      </label>

      <label>
        Panel Coverage (inches)
        <input id="panelCoverage" type="number" value="36" />
      </label>

      <label>
        Rib Spacing (inches)
        <input id="ribSpacing" type="number" value="12" />
      </label>

      <label>
        Start Offset (inches)
        <input id="startOffset" type="number" value="0" />
      </label>

      <label>
        Eave Height (inches)
        <input id="eaveHeight" type="number" value="120" />
      </label>

      <label>
        Roof Pitch (x/12)
        <input id="roofPitch" type="number" value="4" />
      </label>

      <button id="generateBtn">Generate Layout</button>

    </div>

    <!-- SVG OUTPUT -->
    <div class="canvas">

      <svg id="wallSvg"></svg>

    </div>

    <!-- TABLE OUTPUT -->
    <div id="ribTable"></div>

  </div>

  <script type="module" src="./app.js"></script>

</body>
</html>
