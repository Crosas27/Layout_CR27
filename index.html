<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
</head>

<body>

<h2>Panel Layout Tool</h2>

<div class="controls">

<label>Wall Length</label>
<input id="wallLength" placeholder="488">

<label>Panel Coverage</label>
<input id="panelCoverage" value="36">

<label>Rib Spacing</label>
<input id="ribSpacing" value="12">

<label>Start Offset</label>
<input id="startOffset" placeholder="5"
  

<select id="wallType">
<option value="side">Sidewall</option>
<option value="gable">Gable</option>
</select>
</div>

<svg id="wallSvg"></svg>

<div id="ribTable"></div>

<script type="module" src="app.js"></script>

</body>

</html>
