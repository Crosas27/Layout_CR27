<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#08080f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CR27 — Panel Layout Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-bar__left"><span class="led led--ok"></span> SYS ONLINE</span>
    <span id="clock"></span>
    <span>v2.7.0</span>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header__brand">
      <div class="header__logo nm-raised">CR</div>
      <div>
        <div class="header__title">PANEL LAYOUT</div>
        <div class="header__meta">
          <span id="statusLed" class="led"></span>
          <span id="paramCount">0/6 PARAMS SET</span>
        </div>
      </div>
    </div>
    <div class="header__actions">
      <button class="nm-btn header__btn header__btn--accent">↗ SHARE</button>
      <button class="nm-btn header__btn">⊟ CUTS</button>
    </div>
  </header>

  <!-- Main content -->
  <main id="main" class="main">

    <!-- WALL SETUP -->
    <section class="console-card nm-raised" data-section="wall">
      <button class="section-bar" data-toggle="wall">
        <span class="section-bar__arrow">▼</span>
        <span class="section-bar__icon">◧</span>
        <span class="section-bar__title">WALL SETUP</span>
        <span class="led" data-led="wall"></span>
      </button>
      <div class="section-body" data-body="wall">
        <div class="con-select" data-select="wallType">
          <label class="con-label">WALL TYPE</label>
          <button class="nm-well con-select__trigger">
            <span class="con-select__val"><span class="dot">●</span> <span data-select-text>Sidewall</span></span>
            <span class="con-select__arrow">▼</span>
          </button>
          <div class="con-select__dropdown nm-raised" hidden></div>
        </div>
        <div id="wallFields"></div>
      </div>
    </section>

    <!-- PANEL PROFILE -->
    <section class="console-card nm-raised" data-section="profile">
      <button class="section-bar" data-toggle="profile">
        <span class="section-bar__arrow">▼</span>
        <span class="section-bar__icon">◫</span>
        <span class="section-bar__title">PANEL PROFILE</span>
        <span class="led" data-led="profile"></span>
      </button>
      <div class="section-body" data-body="profile">
        <div class="con-select" data-select="panelProfile">
          <label class="con-label">PROFILE TYPE</label>
          <button class="nm-well con-select__trigger">
            <span class="con-select__val"><span class="dot">●</span> <span data-select-text>PBR Panel</span></span>
            <span class="con-select__arrow">▼</span>
          </button>
          <div class="con-select__dropdown nm-raised" hidden></div>
        </div>
        <div id="profileFields"></div>
        <div class="con-toggle">
          <span class="con-label">SHOW RIB LINES</span>
          <button class="con-toggle__track nm-well" data-toggle-switch="showRibs" data-on="true">
            <span class="con-toggle__thumb"></span>
            <span class="con-toggle__label">ON</span>
          </button>
        </div>
      </div>
    </section>

    <!-- OPENINGS -->
    <section class="console-card nm-raised" data-section="openings">
      <button class="section-bar" data-toggle="openings">
        <span class="section-bar__arrow">▼</span>
        <span class="section-bar__icon">◻</span>
        <span class="section-bar__title">OPENINGS</span>
        <span class="led" data-led="openings"></span>
      </button>
      <div class="section-body" data-body="openings">
        <div class="openings-meta">
          <span id="openingCount">1 OPENING DEFINED</span>
          <span>ALL DIMS IN INCHES</span>
        </div>
        <div id="openingsList"></div>
        <button class="nm-btn openings__add" id="addOpening">+ ADD OPENING</button>
      </div>
    </section>
  </main>

  <!-- Slide-up keypad overlay -->
  <div id="keypadOverlay" class="keypad-overlay">
    <div class="keypad-overlay__inner">
      <div class="keypad-overlay__header">
        <div class="keypad-overlay__field">
          <span class="led led--accent"></span>
          <span id="keypadFieldName">INPUT → —</span>
        </div>
        <button class="nm-btn keypad-overlay__done" id="keypadDone">DONE</button>
      </div>
      <div class="nm-well keypad-overlay__preview" id="keypadPreview">
        <span id="keypadValue">—</span><span class="keypad-cursor"></span>
      </div>
      <div class="keypad-grid" id="keypadGrid"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="bottomNav" class="bottom-nav">
    <button class="bottom-nav__item active" data-nav="layout">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">⊞</span>
      <span class="bottom-nav__label">LAYOUT</span>
    </button>
    <button class="bottom-nav__item" data-nav="panels">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">▦</span>
      <span class="bottom-nav__label">PANELS</span>
    </button>
    <button class="bottom-nav__item" data-nav="cutlist">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">☰</span>
      <span class="bottom-nav__label">CUTS</span>
    </button>
    <button class="bottom-nav__item" data-nav="config">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">⚙</span>
      <span class="bottom-nav__label">CONFIG</span>
    </button>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
