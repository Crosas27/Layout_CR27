<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Panel Layout Tool</h2>

<label>Wall Length</label>
<input id="wallLength" placeholder="e.g.488">

<label>Panel Coverage</label>
<input id="panelCoverage" value="36">

<label>Rib Spacing</label>
<input id="ribSpacing" value="12">

<label>Start Offset</label>
<input id="startOffset" placeholder="e.g. 5>

<select id="wallType">
<option value="side">Sidewall</option>
<option value="gable">Gable</option>
</select>

<svg id="wallSvg"></svg>

<div id="ribTable"></div>

<script type="module" src="app.js"></script>

</body>

</html>
