<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Layout Tool</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <h2>Panel Layout Tool</h2>

    <div class="card">
      <label for="wallType">Wall Type</label>
      <select id="wallType">
        <option value="sidewall">Sidewall</option>
        <option value="gable">Gable Endwall</option>
      </select>

      <label for="wallLength">Wall Length</label>
      <input id="wallLength" type="text" inputmode="decimal" placeholder='e.g. 42\' or 504"' />

      <label for="wallHeight">Wall Height</label>
      <input id="wallHeight" type="text" inputmode="decimal" placeholder='e.g. 16\' or 192"' />

      <label for="panelStopHeight">Panel Stop Height</label>
      <input id="panelStopHeight" type="text" inputmode="decimal" placeholder='defaults to wall height' />

      <label for="panelCoverage">Panel Coverage</label>
      <input id="panelCoverage" type="text" inputmode="decimal" value='36"' />

      <label for="ribSpacing">Rib Spacing</label>
      <input id="ribSpacing" type="text" inputmode="decimal" value='12"' />

      <label for="startOffset">Start Offset</label>
      <input id="startOffset" type="text" inputmode="decimal" value='0"' />

      <div id="gableFields" style="display: none;">
        <label for="leftEaveHeight">Left Eave Height</label>
        <input id="leftEaveHeight" type="text" inputmode="decimal" placeholder='e.g. 16\' or 192"' />

        <label for="leftPanelStopHeight">Left Panel Stop Height</label>
        <input id="leftPanelStopHeight" type="text" inputmode="decimal" placeholder='defaults to left eave' />

        <label for="ridgeHeight">Ridge Height</label>
        <input id="ridgeHeight" type="text" inputmode="decimal" placeholder='e.g. 18\' 6"' />

        <label for="ridgePanelStopHeight">Ridge Panel Stop Height</label>
        <input id="ridgePanelStopHeight" type="text" inputmode="decimal" placeholder='defaults to ridge height' />

        <label for="ridgePosition">Ridge Position from Left</label>
        <input id="ridgePosition" type="text" inputmode="decimal" placeholder='e.g. 10\' or 120"' />

        <label for="rightEaveHeight">Right Eave Height</label>
        <input id="rightEaveHeight" type="text" inputmode="decimal" placeholder='e.g. 10\' 6"' />

        <label for="rightPanelStopHeight">Right Panel Stop Height</label>
        <input id="rightPanelStopHeight" type="text" inputmode="decimal" placeholder='defaults to right eave' />
      </div>

      <button id="generateBtn">Generate</button>
    </div>

    <div class="card" id="openingsCard">
      <h3>Openings</h3>

      <div id="openingsList"></div>

      <div class="opening-form">
        <input id="openingStart" type="text" inputmode="decimal" placeholder='Start e.g. 2\' 8"' />
        <input id="openingWidth" type="text" inputmode="decimal" placeholder='Width e.g. 3\' or 36"' />
      </div>

      <button id="addOpeningBtn">Add Opening</button>
    </div>

    <div class="card">
      <svg id="wallSvg"></svg>
    </div>

    <div class="card" id="panelSummary"></div>
    <div class="card" id="openingReport"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
