<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#08080f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CR27 — Panel Layout Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-bar__left"><span class="led led--ok"></span> SYS ONLINE</span>
    <span id="clock"></span>
    <span>v2.7.0</span>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header__brand">
      <div class="header__logo nm-raised">CR</div>
      <div>
        <div class="header__title">PANEL LAYOUT</div>
        <div class="header__meta">
          <span id="statusLed" class="led"></span>
          <span id="paramCount">0/6 PARAMS SET</span>
        </div>
      </div>
    </div>
    <div class="header__actions">
      <button class="nm-btn header__btn header__btn--accent">↗ SHARE</button>
      <button class="nm-btn header__btn">⊟ CUTS</button>
    </div>
  </header>

  <!-- Main content -->
  <main id="main" class="main">

<!-- Wall Setup -->
<div class="card collapsible open">
  <div class="card-header">
    <span>Wall Setup</span>
    <span class="chevron">▼</span>
  </div>

  <div class="card-body">
    <div class="field-grid-2">
      <div class="field-group">
        <label for="wallType">Wall Type</label>
        <select id="wallType">
          <option value="sidewall">Sidewall</option>
          <option value="gable">Gable Endwall</option>
        </select>
      </div>

      <div class="field-group">
        <label for="wallLength">Wall Length</label>
        <input id="wallLength" class="measure-input" type="text" inputmode="none" placeholder='e.g. 42&apos; or 504"' />
      </div>
    </div>

    <div id="sidewallFields" class="field-grid-2">
      <div class="field-group">
        <label for="wallHeight">Wall Height</label>
        <input id="wallHeight" class="measure-input" type="text" inputmode="none" placeholder='e.g. 16&apos; or 192"' />
      </div>

      <div class="field-group">
        <label for="panelStopHeight">Panel Stop Height</label>
        <input id="panelStopHeight" class="measure-input" type="text" inputmode="none" placeholder='defaults to wall height' />
      </div>
    </div>

    <div id="gableFields" style="display: none;">
      <div class="field-grid-2">
        <div class="field-group">
          <label for="leftEaveHeight">Left Eave Height</label>
          <input id="leftEaveHeight" class="measure-input" type="text" inputmode="none" placeholder='e.g. 16&apos; or 192"' />
        </div>

        <div class="field-group">
          <label for="rightEaveHeight">Right Eave Height</label>
          <input id="rightEaveHeight" class="measure-input" type="text" inputmode="none" placeholder='e.g. 10&apos; 6"' />
        </div>
      </div>

      <div class="field-grid-2">
        <div class="field-group">
          <label for="leftPanelStopHeight">Left Panel Stop Height</label>
          <input id="leftPanelStopHeight" class="measure-input" type="text" inputmode="none" placeholder='defaults to left eave' />
        </div>

        <div class="field-group">
          <label for="rightPanelStopHeight">Right Panel Stop Height</label>
          <input id="rightPanelStopHeight" class="measure-input" type="text" inputmode="none" placeholder='defaults to right eave' />
        </div>
      </div>

      <div class="field-grid-2">
        <div class="field-group">
          <label for="ridgeHeight">Ridge Height</label>
          <input id="ridgeHeight" class="measure-input" type="text" inputmode="none" placeholder='e.g. 18&apos; 6"' />
        </div>

        <div class="field-group">
          <label for="ridgePosition">Ridge Position from Left</label>
          <input id="ridgePosition" class="measure-input" type="text" inputmode="none" placeholder='e.g. 10&apos; or 120"' />
        </div>
      </div>

      <div class="field-group">
        <label for="ridgePanelStopHeight">Ridge Panel Stop Height</label>
        <input id="ridgePanelStopHeight" class="measure-input" type="text" inputmode="none" placeholder='defaults to ridge height' />
      </div>
    </div>
  </div>
</div>

<!-- Panel Profile -->
<div class="card collapsible">
  <div class="card-header">
    <span>Panel Profile</span>
    <span class="chevron">▼</span>
  </div>

  <div class="card-body">
    <div class="field-grid-2">
      <div class="field-group">
        <label for="panelCoverage">Panel Coverage</label>
        <input id="panelCoverage" class="measure-input" type="text" inputmode="none" value='36"' />
      </div>

      <div class="field-group">
        <label for="ribSpacing">Rib Spacing</label>
        <input id="ribSpacing" class="measure-input" type="text" inputmode="none" value='12"' />
      </div>
    </div>

    <div class="field-group">
      <label for="startOffset">Start Offset</label>
      <input id="startOffset" class="measure-input" type="text" inputmode="none" value='0"' />
    </div>
  </div>
</div>
  
    <!-- OPENINGS -->
    <section class="console-card nm-raised" data-section="openings">
      <button class="section-bar" data-toggle="openings">
        <span class="section-bar__arrow">▼</span>
        <span class="section-bar__icon">◻</span>
        <span class="section-bar__title">OPENINGS</span>
        <span class="led" data-led="openings"></span>
      </button>
      <div class="section-body" data-body="openings">
        <div class="openings-meta">
          <span id="openingCount">1 OPENING DEFINED</span>
          <span>ALL DIMS IN INCHES</span>
        </div>
        <div id="openingsList"></div>
        <button class="nm-btn openings__add" id="addOpening">+ ADD OPENING</button>
      </div>
    </section>
  </main>

  <!-- Slide-up keypad overlay -->
  <div id="keypadOverlay" class="keypad-overlay">
    <div class="keypad-overlay__inner">
      <div class="keypad-overlay__header">
        <div class="keypad-overlay__field">
          <span class="led led--accent"></span>
          <span id="keypadFieldName">INPUT → —</span>
        </div>
        <button class="nm-btn keypad-overlay__done" id="keypadDone">DONE</button>
      </div>
      <div class="nm-well keypad-overlay__preview" id="keypadPreview">
        <span id="keypadValue">—</span><span class="keypad-cursor"></span>
      </div>
      <div class="keypad-grid" id="keypadGrid"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="bottomNav" class="bottom-nav">
    <button class="bottom-nav__item active" data-nav="layout">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">⊞</span>
      <span class="bottom-nav__label">LAYOUT</span>
    </button>
    <button class="bottom-nav__item" data-nav="panels">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">▦</span>
      <span class="bottom-nav__label">PANELS</span>
    </button>
    <button class="bottom-nav__item" data-nav="cutlist">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">☰</span>
      <span class="bottom-nav__label">CUTS</span>
    </button>
    <button class="bottom-nav__item" data-nav="config">
      <span class="bottom-nav__indicator"></span>
      <span class="bottom-nav__icon">⚙</span>
      <span class="bottom-nav__label">CONFIG</span>
    </button>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
